backend:
  name: github
  repo: xude985-collab/ipas8848-site
  branch: main
  auth_type: pkce
  app_id: Ov23liV7Qxrbth2lKcR4

media_folder: static/images
public_folder: /images

locale: zh_Hans

collections:
  - name: "posts"
    label: "行业资讯"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "标签", name: "tags", widget: "list" }
      - { label: "摘要", name: "summary", widget: "string" }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "pages"
    label: "页面"
    files:
      - label: "关于我们"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "正文", name: "body", widget: "markdown" }
      - label: "服务项目"
        name: "services"
        file: "content/services.md"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "正文", name: "body", widget: "markdown" }
